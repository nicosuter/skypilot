{{- $fullName := include "skypilot.fullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-api-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP  # Use clusterIP to allow ingress to authenticate
  {{- if and .Values.apiService.host (contains ":" .Values.apiService.host) }}
  # An IPv6 bind host (e.g. "::") requires a dual-stack service so IPv6 clients
  # can reach it. PreferDualStack falls back to single-stack on clusters that
  # do not support dual-stack.
  ipFamilyPolicy: PreferDualStack
  {{- end }}
  ports:
    - port: 80
      name: http
      targetPort: 46580  # Assuming your container listens on port 46580
      protocol: TCP
  {{- if .Values.apiService.metrics.enabled }}
    - port: {{ .Values.apiService.metrics.port }}
      name: metrics
      targetPort: {{ .Values.apiService.metrics.port }}
      protocol: TCP
  {{- end }}
  selector:
    app: {{ $fullName }}-api
    skypilot.co/ready: "true"
